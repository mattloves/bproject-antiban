name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev libncurses6 zlib1g-dev libssl-dev
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Accept Android SDK licenses
      run: |
        mkdir -p $HOME/.android
        echo "### User Sources for Android SDK Manager" > $HOME/.android/repositories.cfg
        echo "count=0" >> $HOME/.android/repositories.cfg
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n8933bad161af4d5e1ff7d6a6ade4b1edee24a7c7" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
    
    - name: Build APK with Buildozer
      run: |
        cd ${{ github.workspace }}
        buildozer android debug
    
    - name: Upload APK if exists
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build
        path: bin/*.apk
        if-no-files-found: ignore
