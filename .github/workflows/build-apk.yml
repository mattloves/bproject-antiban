name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev libncurses6 zlib1g-dev libssl-dev unzip zip
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Download Android SDK command-line tools
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
        cd $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O tools.zip
        unzip -q tools.zip
        mv cmdline-tools latest
        rm tools.zip
    
    - name: Accept Android SDK licenses
      run: |
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
    
    - name: Build APK with Buildozer
      run: |
        cd ${{ github.workspace }}
        buildozer android debug 2>&1 || true
    
    - name: Check for APK
      run: |
        ls -la bin/ 2>/dev/null || echo "No bin directory"
        find . -name "*.apk" 2>/dev/null
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apk-build
        path: |
          bin/*.apk
          ./*.apk
        if-no-files-found: warn
