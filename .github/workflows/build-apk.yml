name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          automake zip unzip openjdk-17-jdk
        
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Build with Buildozer
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        
        # Create Android SDK directory structure
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        
        # Download command-line tools
        cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
        unzip -q tools.zip
        mv cmdline-tools latest
        rm tools.zip
        
        # Accept licenses
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n8933bad161af4d5e1ff7d6a6ade4b1edee24a7c7" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        
        # Set SDK root
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        
        # Run buildozer
        cd $GITHUB_WORKSPACE
        buildozer android debug 2>&1 | tee build.log || true
        
        echo "=== Build log tail ==="
        tail -100 build.log
    
    - name: Find APK files
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f 2>/dev/null
        ls -la bin/ 2>/dev/null || echo "No bin dir"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bproject-antiban-apk
        path: |
          bin/*.apk
          .buildozer/android/platform/build-arm64-v8a/dists/antiban_cloud/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30
